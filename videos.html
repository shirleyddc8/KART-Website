<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos - Kart Films</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,400;0,600;0,700;1,700&display=swap" rel="stylesheet">

    <style>
        /* ========================================== */
        /* === CSS: GLOBAL SETUP === */
        /* ========================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #fff; color: #000; font-family: 'Roboto', sans-serif; overflow: hidden; }

        /* ========================================== */
        /* === CSS: NAVIGATION SETTINGS === */
        /* ========================================== */
        .global-nav { position: fixed; top: 40px; right: 60px; z-index: 100; }
        .global-nav ul { list-style: none; display: flex; gap: 40px; }
        .nav-link { text-decoration: none; color: #000; font-weight: 600; font-size: 16px; transition: color 0.3s ease; padding-bottom: 5px; }
        .nav-link:hover, .nav-link.active { color: #FF0000; text-decoration: underline; text-underline-offset: 8px; text-decoration-thickness: 2px; }

        /* === CSS: SHOWREELS DROPDOWN === */
        .dropdown { position: relative; display: inline-block; }
        .dropdown-content {
            opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease;
            position: absolute; top: 35px; left: 50%; transform: translateX(-50%);
            background-color: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); 
            min-width: 140px; min-height: 100px; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            gap: 10px; margin: 0; padding: 5px 0; border-radius: 8px; list-style: none;
        }
        .dropdown:hover .dropdown-content { opacity: 1; visibility: visible; }
        .dropdown-content li { width: 100%; text-align: center; }
        .dropdown-content a {
            color: #000; padding: 12px 0px; text-decoration: none; display: block; 
            width: 100%; font-weight: 600; font-size: 14px; transition: all 0.2s ease; border-radius: 10px;
        }
        .dropdown-content a:hover { color: #FF0000; background-color: rgba(0, 0, 0, 0.05); font-weight: 700; }

        /* ========================================== */
        /* === CSS: PAGE LAYOUT === */
        /* ========================================== */
        .page-container { display: flex; height: 100vh; width: 100vw; }

        /* --- Left Sidebar (Black with Logo) --- */
        .sidebar {
            flex: 0 0 25%;
            background-color: #111;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            z-index: 10;
        }

        .sidebar img {
            height: 120%;
            width: auto;
            object-fit: cover;
            opacity: 0.9;
        }

        /* --- Main Content Area --- */
        .main-content {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px; /* Crucial for the 3D wheel depth */
        }

        .section-title {
            position: absolute;
            left: 10%; 
            font-size: 28px;
            font-style: italic;
            font-weight: 700;
            z-index: 50;
        }

        /* ========================================== */
        /* === CSS: 3D WHEEL CAROUSEL === */
        /* ========================================== */
        .carousel {
            position: relative;
            width: 50%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
        }

        .video-card {
            position: absolute;
            width: 100%;
            max-width: 650px; 
            aspect-ratio: 16 / 9;
            background-color: #000; /* Black background while loading */
            border-radius: 4px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            /* Smooth transitions for the rotation and push-back effects */
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.6s ease;
            overflow: hidden;
            cursor: pointer;
        }

        .video-card video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ========================================== */
        /* === CSS: MOBILE RESPONSIVENESS (HANDPHONE) === */
        /* ========================================== */
        @media (max-width: 768px) {
            .page-container {
                flex-direction: column;
                height: 100vh;
            }

            /* Hide the large vertical logo on handphones for a cleaner look */
            .sidebar {
                display: none;
            }

            /* 1. Navigation at the top */
            .global-nav {
                position: relative;
                top: 0;
                right: 0;
                padding: 15px 0;
                display: flex;
                justify-content: center;
                background-color: #fff;
                z-index: 100;
            }

            .global-nav ul {
                gap: 15px;
                flex-wrap: wrap;
                justify-content: center;
            }

            /* Update Dropdown positioning for mobile */
            .dropdown-content {
                left: 50%;
                top: 30px;
            }

            /* Main Content Container */
            .main-content {
                flex-direction: column;
                justify-content: flex-start;
                padding-top: 30px;
            }

            /* 2. "Videos" text header */
            .section-title {
                position: relative;
                left: 0;
                text-align: center;
                margin-bottom: 30px;
            }

            /* 3. The Video Carousel */
            .carousel {
                width: 85%;
                height: 60vh; /* Adjusts height to fit the screen */
            }
        }

    </style>
</head>
<body>

    <nav class="global-nav">
        <ul>
            <li><a href="index.html" class="nav-link">Home</a></li>
            <li><a href="about_us.html" class="nav-link">About Us</a></li>
            <li class="dropdown">
                <a href="#" class="nav-link active">Videos</a>
                <ul class="dropdown-content">
                    <li><a href="videos.html">Videos</a></li>
                    <li><a href="programs.html">Programs</a></li>
                </ul>
            </li>
            <li><a href="contact.html" class="nav-link">Contact Us</a></li>
        </ul>
    </nav>

    <div class="page-container">
        
        <div class="sidebar">
            <img src="images/Kart-logo-1.png" alt="Kart Logo">
        </div>

        <div class="main-content">
            <h1 class="section-title">Videos</h1>
            
            <div class="carousel" id="videoCarousel">
                <div class="video-card"><video src="images/V1.mp4" muted loop playsinline></video></div>
                <div class="video-card"><video src="images/V2.mp4" muted loop playsinline></video></div>
                <div class="video-card"><video src="images/V3.mp4" muted loop playsinline></video></div>
                <div class="video-card"><video src="images/V4.mp4" muted loop playsinline></video></div>
                <div class="video-card"><video src="images/V5.mp4" muted loop playsinline></video></div>
                <div class="video-card"><video src="images/V6.mp4" muted loop playsinline></video></div>
                <div class="video-card"><video src="images/V7.mp4" muted loop playsinline></video></div>
                <div class="video-card"><video src="images/V8.mp4" muted loop playsinline></video></div>
                <div class="video-card"><video src="images/V9.mp4" muted loop playsinline></video></div>
                <div class="video-card"><video src="images/V10.mp4" muted loop playsinline></video></div>
                <div class="video-card"><video src="images/V11.mp4" muted loop playsinline></video></div>
            </div>
        </div>

    </div>

    <script>
        const cards = document.querySelectorAll('.video-card');
        let currentIndex = 0;

        function updateCarousel() {
            cards.forEach((card, index) => {
                const video = card.querySelector('video');
                const offset = index - currentIndex;
                
                if (offset === 0) {
                    // CENTER ITEM (Active, flat, full size)
                    card.style.transform = `translateY(0) translateZ(0px) rotateX(0deg)`;
                    card.style.opacity = '1';
                    card.style.zIndex = '10';
                    video.play(); 
                } else if (offset === -1) {
                    // TOP ITEM (Pushed up, pushed back in 3D space, tilted back)
                    card.style.transform = `translateY(-75%) translateZ(-250px) rotateX(45deg)`;
                    card.style.opacity = '0.3';
                    card.style.zIndex = '5';
                    video.pause();
                } else if (offset === 1) {
                    // BOTTOM ITEM (Pushed down, pushed back, tilted forward)
                    card.style.transform = `translateY(75%) translateZ(-250px) rotateX(-45deg)`;
                    card.style.opacity = '0.3';
                    card.style.zIndex = '5';
                    video.pause();
                } else {
                    // HIDDEN ITEMS (Too far up or down)
                    let direction = offset < 0 ? -120 : 120;
                    let tilt = offset < 0 ? 60 : -60;
                    card.style.transform = `translateY(${direction}%) translateZ(-500px) rotateX(${tilt}deg)`;
                    card.style.opacity = '0';
                    card.style.zIndex = '1';
                    video.pause();
                }
            });
        }

        // Initialize first view
        updateCarousel();

        // 1. Scroll Navigation
        window.addEventListener('wheel', (e) => {
            if (e.deltaY > 0) {
                currentIndex = Math.min(currentIndex + 1, cards.length - 1);
            } else {
                currentIndex = Math.max(currentIndex - 1, 0);
            }
            updateCarousel();
        });

        // 2. Click Logic (Navigate or Fullscreen)
        cards.forEach((card, index) => {
            card.addEventListener('click', () => {
                const video = card.querySelector('video');

                // If clicking an item that isn't centered, bring it to the center
                if (index !== currentIndex) {
                    currentIndex = index;
                    updateCarousel();
                } 
                // If clicking the item that IS already centered, go full screen and unmute!
                else {
                    video.muted = false; // Unmute sound
                    video.currentTime = 0; // Restart from the beginning
                    
                    // Trigger Fullscreen
                    if (video.requestFullscreen) {
                        video.requestFullscreen();
                    } else if (video.webkitRequestFullscreen) { /* Safari */
                        video.webkitRequestFullscreen();
                    } else if (video.msRequestFullscreen) { /* IE11 */
                        video.msRequestFullscreen();
                    }
                }
            });
        });

        // 3. Mute the video again when the user exits Fullscreen
        document.addEventListener('fullscreenchange', exitHandler);
        document.addEventListener('webkitfullscreenchange', exitHandler);
        document.addEventListener('mozfullscreenchange', exitHandler);
        document.addEventListener('MSFullscreenChange', exitHandler);

        function exitHandler() {
            if (!document.fullscreenElement && !document.webkitIsFullScreen && !document.mozFullScreen && !document.msFullscreenElement) {
                // The user just exited fullscreen
                const centerVideo = cards[currentIndex].querySelector('video');
                centerVideo.muted = true; // Quiet the video down again
            }
        }
    </script>
</body>
</html>
