<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Kart Films</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,400;0,600;0,700;1,600;1,700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ========================================== */
        /* === CSS: GLOBAL SETUP === */
        /* ========================================== */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body { 
            background-color: #fff; 
            color: #000; 
            font-family: 'Roboto', sans-serif; 
            overflow: hidden; 
        }

        /* ========================================== */
        /* === CSS: NAVIGATION SETTINGS === */
        /* ========================================== */
        .global-nav { 
            position: fixed; 
            top: 40px; 
            right: 60px; 
            z-index: 100; 
        }

        .global-nav ul { 
            list-style: none; 
            display: flex; 
            gap: 40px; 
        }

        .nav-link { 
            text-decoration: none; 
            color: #000; 
            font-weight: 600; 
            font-size: 16px; 
            transition: color 0.3s ease; 
            padding-bottom: 5px; 
        }

        .nav-link:hover, 
        .nav-link.active { 
            color: #FF0000; 
            text-decoration: underline; 
            text-underline-offset: 8px; 
            text-decoration-thickness: 2px; 
        }

        /* ========================================== */
        /* === CSS: SHOWREELS DROPDOWN === */
        /* ========================================== */
        .dropdown { 
            position: relative; 
            display: inline-block; 
        }
        
        .dropdown-content {
            opacity: 0; 
            visibility: hidden; 
            transition: opacity 0.3s ease, visibility 0.3s ease;
            position: absolute; 
            top: 35px; 
            left: 50%; 
            transform: translateX(-50%);
            background-color: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(12px); 
            min-width: 140px; 
            min-height: 100px; 
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.1);
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            gap: 10px; 
            margin: 0; 
            padding: 5px 0; 
            border-radius: 8px; 
            list-style: none;
        }
        
        .dropdown:hover .dropdown-content { 
            opacity: 1; 
            visibility: visible; 
        }
        
        .dropdown-content li { 
            width: 100%; 
            text-align: center; 
        }
        
        .dropdown-content a {
            color: #000; 
            padding: 12px 0px; 
            text-decoration: none; 
            display: block; 
            width: 100%; 
            font-weight: 600; 
            font-size: 14px; 
            transition: all 0.2s ease; 
            border-radius: 10px;
        }
        
        .dropdown-content a:hover { 
            color: #FF0000; 
            background-color: rgba(0, 0, 0, 0.05); 
            font-weight: 700; 
        }

        /* ========================================== */
        /* === CSS: PAGE LAYOUT === */
        /* ========================================== */
        .split-layout { 
            display: flex; 
            height: 100vh; 
            width: 100vw; 
        }

        /* --- Left Panel: Back/Turn Portrait --- */
        .left-panel { 
            flex: 0 0 45%; 
            height: 100vh; 
            background-image: url('images/leong-back.png'); 
            background-size: 78%;
            background-repeat: no-repeat;
            background-position: center 60%;
            transition: background-image 0.2s ease-in-out; 
            cursor: pointer; 
        }

        /* 1. Mobile Tap Toggle (Controlled by your HTML onclick) */
        .left-panel.turn-active { 
            background-image: url('images/leong-backturn.png'); 
            background-size: 78%; 
            background-position: center 62%; 
        }

        /* 2. Desktop Hover (Only activates if the device has a physical mouse) */
        @media (hover: hover) {
            .left-panel:hover { 
                background-image: url('images/leong-backturn.png'); 
                background-size: 78%; 
                background-position: center 62%; 
            }
        }

        /* --- Right Panel: Form Area --- */
        .right-panel { 
            flex: 1; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            padding: 0 80px; 
            padding-top: 80px; 
        }

        /* ========================================== */
        /* === CSS: CONTACT FORM === */
        /* ========================================== */
        .contact-container {
            width: 100%;
            max-width: 550px;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 40px;
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-row input {
            flex: 1; 
        }

        .input-field {
            background-color: #f2f2f2;
            border: none;
            border-radius: 8px;
            padding: 15px 20px;
            font-family: 'Roboto', sans-serif;
            font-size: 16px;
            font-weight: 600;
            font-style: italic;
            color: #000;
            width: 100%;
            outline: none;
            transition: background-color 0.3s ease;
        }

        .input-field:focus {
            background-color: #e6e6e6; 
        }

        .input-field::placeholder {
            color: #000;
        }

        textarea.input-field {
            min-height: 250px;
            resize: vertical;
        }

        .submit-btn {
            background-color: #111;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Roboto', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.3s ease;
            text-transform: uppercase;
        }

        .submit-btn:hover {
            background-color: #FF0000;
        }

        /* ========================================== */
        /* === CSS: CONTACT INFO & SOCIALS === */
        /* ========================================== */
        .contact-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .phone-link {
            text-decoration: none;
            color: #000;
            font-size: 18px;
            font-weight: 700;
            font-style: italic;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: color 0.3s ease;
        }

        .phone-link:hover {
            color: #FF0000;
        }

        .social-icons {
            display: flex;
            gap: 25px;
            font-size: 24px;
        }

        .social-icons a {
            transition: transform 0.2s ease, opacity 0.2s ease;
            text-decoration: none;
        }

        .social-icons a:hover {
            transform: scale(1.1);
            opacity: 0.8;
        }

        .fa-facebook-square { 
            color: #3b5998; 
        }
        
        .fa-instagram { 
            background: -webkit-linear-gradient(#405de6, #5851db, #833ab4, #c13584, #e1306c, #fd1d1d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .fa-linkedin { 
            color: #0077b5; 
        }

        /* ========================================== */
        /* === CSS: MOBILE RESPONSIVENESS (HANDPHONE) === */
        /* ========================================== */
        @media (max-width: 768px) {
            body { 
                overflow-y: auto; 
                overflow-x: hidden; 
            }

            .split-layout { 
                flex-direction: column; 
                height: auto; 
            }

            .global-nav { 
                position: relative; 
                top: 0; 
                right: 0; 
                padding: 20px 0; 
                background-color: #fff;
                display: flex;
                justify-content: center;
                z-index: 100;
            }

            .global-nav ul { 
                gap: 15px; 
                flex-wrap: wrap; 
                justify-content: center;
            }

            .dropdown-content {
                left: 50%;
                top: 30px;
            }

            .left-panel { 
                flex: none; 
                width: 100%; 
                height: 50vh; 
                background-position: center top; 
            }

            .right-panel { 
                flex: none; 
                width: 100%;
                padding: 40px 20px; 
            }

            .form-row {
                flex-direction: column; 
            }
        }
    </style>
</head>
<body>

    <nav class="global-nav">
        <ul>
            <li><a href="index.html" class="nav-link">Home</a></li>
            <li><a href="about_us.html" class="nav-link">About Us</a></li>
            <li class="dropdown">
                <a href="#" class="nav-link">Showreels</a>
                <ul class="dropdown-content">
                    <li><a href="videos.html">Videos</a></li>
                    <li><a href="programs.html">Programs</a></li>
                </ul>
            </li>
            <li><a href="contact.html" class="nav-link active">Contact Us</a></li>
        </ul>
    </nav>

    <main class="split-layout">
        
        <div class="left-panel" onclick="this.classList.toggle('turn-active')"></div>
        
        <div class="right-panel">
            <div class="contact-container">
                
                <form class="contact-form" onsubmit="event.preventDefault();">
                    <div class="form-row">
                        <input type="text" class="input-field" placeholder="Name:" required>
                        <input type="email" class="input-field" placeholder="Email:" required>
                    </div>
                    <input type="text" class="input-field" placeholder="Subject:" required>
                    <textarea class="input-field" placeholder="Message:" required></textarea>
                    
                    <button type="submit" class="submit-btn">Send Message</button>
                </form>

                <div class="contact-info">
                    <a href="tel:+6593822826" class="phone-link">
                        <i class="fa-solid fa-phone"></i> +65 9382 2826
                    </a>
                    
                    <div class="social-icons">
                        <a href="#" target="_blank"><i class="fa-brands fa-facebook-square"></i></a>
                        <a href="#" target="_blank"><i class="fa-brands fa-instagram"></i></a>
                        <a href="#" target="_blank"><i class="fa-brands fa-linkedin"></i></a>
                    </div>
                </div>

            </div>
        </div>

    </main>

</body>
</html>
